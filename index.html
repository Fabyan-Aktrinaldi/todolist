<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern To-Do List</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<header>
<h1>To-Do List</h1>
<button id="darkToggle">🌙</button>
</header>

<section class="input-section">

<input type="text" id="taskInput" placeholder="Add new task...">

<input type="datetime-local" id="deadlineInput">

<select id="categoryInput">
<option value="General">General</option>
<option value="Study">Study</option>
<option value="Work">Work</option>
<option value="Personal">Personal</option>
</select>

<button id="addTaskBtn">Add</button>

</section>

<section class="search-filter">

<input type="text" id="searchInput" placeholder="Search task...">

<div class="filters">
<button data-filter="all">All</button>
<button data-filter="active">Active</button>
<button data-filter="completed">Completed</button>
</div>

</section>

<section class="progress-section">

<div class="progress-bar">
<div class="progress-fill" id="progressFill"></div>
</div>

</section>

<section class="stats">

<p>Total: <span id="totalTasks">0</span></p>
<p>Completed: <span id="completedTasks">0</span></p>
<p>Active: <span id="activeTasks">0</span></p>

</section>

<ul id="taskList"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
